<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Login</h1>
        <form action="">
        <label for="email" class="email">
          Email:
          <input type="email" id="email" placeholder="name@gmail.com">
        </label>
        <label for="pass" class="pass">
            Password:
            <input type="password" name="password" id="pass" placeholder="password">
        </label>
        <a class="a1" href="">Create new Account</a>
        <a class="a2" href="">Forgot password</a>
        <button class="bt1"  type="reset">Login</button>
        </form>
    </div>
</body>
</html>
